
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/estilos.css">
    <title>Registro</title>
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <img src="/IMG/logo.png" alt="logo">
            <h2>Punto Cajas</h2>
        </div>

        <nav class="menu">
            <a href="Inicio_Sesion.html">Inicio de sesion</a>
        </nav>

    </header>
    <section>
        
        <form action="#">
            <h2>Registro</h2> <br>
            <div class="Caja">
                <label for="nombre">Nombre</label>
                <div class="Contenedor">
                    <input type="text" id="nombre" name="nombre" required>
                </div>
            </div>

            <div class="Caja">
                <label for="apellido">Apellido</label>
                <div class="Contenedor">
                    <input type="text" id="apellido" name="apellido" required>
                </div>
            </div>

            <div class="Caja">
                <label for="tipo_id">Tipo de identificacion</label>
                <div class="type">
                    <select name="tipo_id" id="tipo_id" required>
                        <option value="">Seleccione una opcion</option>
                        <option value="CC">Cedula de Ciudadania</option>
                        <option value="TI">Tarjeta de Identidad</option>
                        <option value="CE">Cedula Extranjera</option>
                        <option value="pasaporte">Pasaporte</option>
                    </select>
                </div>
            </div>

            <div class="Caja">
                <label for="numero_id">Numero de identificacion</label>
                <div class="Contenedor">
                    <input type="int" id="numero_id" name="numero_id" required>
                </div>
            </div>

            <div class="Caja">
                <label for="direccion">Direccion</label>
                <div class="Contenedor">
                    <input type="text" id="direccion" name="direccion" required>
                </div>
            </div>

            <div class="Caja">
                <label for="telefono">Telefono</label>
                <div class="Contenedor">
                    <input type="int" id="telefono" name="telefono" minlength="10" required>
                </div>
            </div>

            <div class="Caja">
                <label for="correo">Correo electronico</label>
                <div class="Contenedor">
                    <input type="email" id="correo" name="correo" required>
                </div>
            </div>

            <div class="Caja">
                <label for="clave">Contraseña</label>
                <div class="Contenedor">
                    <input type="password" id="clave" name="clave" minlength="10" required>
                </div>
            </div>

            <div class="Caja">
                <label for="confirmarclave">Confirmar contraseña</label>
                <div class="Contenedor">
                    <input type="password" id="confirmarclave" name="confirmarclave" minlength="10" required>
                </div>
            </div>

            <button type="submit">Registrarme</button>
        </form>
    </section>
</body>
</html>
