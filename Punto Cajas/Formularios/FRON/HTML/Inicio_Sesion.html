<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesion</title>
    <link rel="stylesheet" href="/FRON/CSS/estilos.css">
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <img src="/FRON/IMG/logo.png" alt="logo">
            <h2>Punto Cajas</h2>
        </div>

        <nav class="menu">
            <a href="index.html">Registro</a>
        </nav>
    </header>
    <section>
        <form action="#">
            <div class="Caja">
                <h2>Inicio de Sesion</h2><br>
                <label for="correo">Correo</label>
                <div class="Contenedor">
                    <input type="email" id="correo" name="correo" required>
                </div>
            </div>

            <div class="Caja">
                <label for="clave">Contraseña</label>
                <div class="Contenedor">
                    <input type="password" id="clave" name="clave" minlength="10" required>
                </div>
            </div>

            <div class="Recuperar-contenedor">
                <p>Has olvidado tu contraseña?</p>
                <a href="Recuperar_clave.html">Recuperar contraseña</a>
            </div>

            <button type="submit">Entrar</button>
        </form>
    </section>
</body>
</html>
